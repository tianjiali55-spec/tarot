    body {

      min-height: 100vh;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      touch-action: pan-x;
    }

    /* ===== 星河背景 ===== */
    .stars-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;

    }
    .stars-bg::before {
      content: '';
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 25% 35%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 55% 22%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 70% 8%, rgba(255,255,255,0.45), transparent),
        radial-gradient(1px 1px at 85% 28%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1px 1px at 15% 45%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 33% 50%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 60% 40%, rgba(255,255,255,0.25), transparent),
        radial-gradient(1px 1px at 78% 48%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1px 1px at 92% 38%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 5% 65%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1px 1px at 48% 70%, rgba(255,255,255,0.25), transparent),
        radial-gradient(1px 1px at 80% 72%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.25), transparent),
        radial-gradient(1.5px 1.5px at 65% 90%, rgba(255,255,255,0.35), transparent);
    }

    /* 粒子画布 */
    #particleCanvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    /* ===== 主容器 ===== */
    .app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 16px 30px;
    }

    /* ===== 标题 ===== */
    .title-area {
      text-align: center; margin-bottom: 16px;
    }
    .title-area h1 {
      font-size: clamp(24px, 5vw, 36px);
      color: #e8d49a;
      letter-spacing: 4px;
      text-shadow: 0 0 30px rgba(201,168,76,0.4), 0 0 60px rgba(201,168,76,0.15);
      font-weight: normal;
    }
    .title-area .sub {
      font-size: 12px; color: #8a7a5a; letter-spacing: 6px;
      margin-top: 4px;
    }

    /* ===== 牌组滚动区 ===== */
    .cards-scroll {
      width: 100%; max-width: 100vw;
      overflow-x: auto;
      overflow-y: visible;
      padding: 20px 0 30px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .cards-scroll::-webkit-scrollbar { display: none; }

    .cards-track {
      display: flex; gap: 0;
      padding: 10px calc(50vw - 50px);
      width: max-content;
    }

    /* ===== 单张牌 ===== */
    .card-slot {
      flex-shrink: 0;
      width: 80px; height: 120px;
      margin: 0 -5px;
      perspective: 800px;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), margin 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; z-index: 1;
    }
    .card-slot:hover {
      transform: translateY(-12px) scale(1.08);
      margin: 0 6px;
      z-index: 10;
      transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94), margin 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .card-slot.highlighted {
      transform: translateY(-14px) scale(1.12);
      margin: 0 8px;
      z-index: 15;
      transition: transform 0.1s ease-out, margin 0.1s ease-out;
    }
    .card-slot.shuffling {
      transition: transform 0.08s cubic-bezier(0.4, 0, 0.2, 1), margin 0.08s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.08s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 长按进度环 */
    .card-slot .long-press-ring {
      position: absolute;
      inset: -6px;
      border-radius: 14px;
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .card-slot .long-press-ring svg {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
      transform: rotate(-90deg);
    }
    .card-slot .long-press-ring circle {
      fill: none;
      stroke: #c9a84c;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 0;
      transition: stroke-dasharray 0.1s linear;
    }
    .card-slot.pressing .long-press-ring {
      opacity: 1;
    }

    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 10px;
    }
    .card-slot.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.2);
      overflow: hidden;
    }

    /* 牌背 */
    .card-back {
      background: linear-gradient(135deg, #1a1040 0%, #2a1860 40%, #1a1040 100%);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .card-back::before {
      content: '';
      position: absolute;
      top: 6px; left: 6px; right: 6px; bottom: 6px;
      border: 2px solid rgba(201,168,76,0.35);
      border-radius: 6px;
    }
    .card-back::after {
      content: '✦';
      font-size: 32px;
      color: rgba(201,168,76,0.5);
      text-shadow: 0 0 15px rgba(201,168,76,0.4);
    }
    .card-back-inner {
      position: absolute;
      top: 12px; left: 12px; right: 12px; bottom: 12px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .card-back-inner::before {
      content: '';
      position: absolute;
      width: 36px; height: 36px;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 50%;
    }
    .card-back-inner::after {
      content: '✧';
      font-size: 14px;
      color: rgba(201,168,76,0.4);
    }

    /* 牌面 */
    .card-front {
      background: linear-gradient(135deg, #fef7e6 0%, #f5e6c8 50%, #fef7e6 100%);
      transform: rotateY(180deg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px;
    }
    .card-front .card-num {
      font-size: 10px; color: #8a7a5a; letter-spacing: 2px;
      margin-bottom: 2px;
    }
    .card-front .card-suit {
      font-size: 9px; color: #b89a3a; letter-spacing: 1px;
      margin-bottom: 4px; text-transform: uppercase;
    }
    .card-front .card-title {
      font-size: 13px; font-weight: bold; color: #3a2a10;
      letter-spacing: 1px; text-align: center; line-height: 1.3;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    /* ===== 底部提示区 ===== */
    .hint-bar {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px;
      margin-top: auto;
      padding: 20px 0 10px;
    }
    .hint-text {
      font-size: 15px; color: #c9a84c;
      letter-spacing: 2px;
      animation: hintPulse 2s ease-in-out infinite;
      text-align: center;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .hint-icon {
      font-size: 36px;
      filter: drop-shadow(0 0 10px rgba(201,168,76,0.3));
      animation: floatIcon 2.5s ease-in-out infinite;
    }
    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* ===== 状态指示 ===== */
    #status {
      position: fixed; top: 12px; right: 12px;
      background: rgba(10,10,30,0.85);
      color: #c9a84c; padding: 6px 14px;
      border-radius: 20px; font-size: 12px;
      border: 1px solid rgba(201,168,76,0.3);
      z-index: 100; letter-spacing: 1px;
      backdrop-filter: blur(6px);
    }

    /* ===== 结果弹层 ===== */
    .result-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(6,6,15,0.92);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(8px);
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .result-overlay.active {
      opacity: 1; pointer-events: auto;
    }
    .result-card {
      width: 90%; max-width: 420px; max-height: 90vh;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      background: linear-gradient(160deg, #1e1648 0%, #0d0d28 100%);
      border-radius: 20px; padding: 36px 28px;
      text-align: center;
      border: 2px solid #c9a84c;
      box-shadow: 0 0 80px rgba(201,168,76,0.2), 0 20px 60px rgba(0,0,0,0.6);
      margin: auto;
      position: relative;
      animation: resultIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes resultIn {
      from { transform: scale(0.8) translateY(30px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    .result-card::before {
      content: '';
      position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 12px; pointer-events: none;
    }
    .result-icon {
      font-size: 56px; margin-bottom: 12px;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.5));
    }
    .result-name {
      font-size: 34px; color: #f0d68a; letter-spacing: 4px;
      margin-bottom: 6px;
      text-shadow: 0 0 24px rgba(201,168,76,0.4);
    }
    .result-en {
      font-size: 13px; color: #8a7a5a; letter-spacing: 3px;
      margin-bottom: 24px;
    }
    .result-interp {
      font-size: 17px; color: #e0d5c0; line-height: 1.8;
      min-height: 60px; padding: 0 8px;
    }
    .result-interp.loading {
      color: #a8926a;
      animation: hintPulse 2s ease-in-out infinite;
    }
    .result-close {
      margin-top: 28px;
      background: transparent; color: #c9a84c;
      border: 1px solid #c9a84c; padding: 10px 36px;
      border-radius: 30px; font-size: 15px; cursor: pointer;
      letter-spacing: 2px; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
    }
    .result-close:hover {
      background: rgba(201,168,76,0.12);
      box-shadow: 0 0 20px rgba(201,168,76,0.25);
    }

    /* ===== 响应式 ===== */
    @media (min-width: 768px) {
      .card-slot { width: 88px; height: 132px; margin: 0 -5px; }
      .card-slot:hover { margin: 0 8px; }
      .card-front .card-title { font-size: 15px; }
      .card-front .card-suit { font-size: 10px; }
      .card-back::after { font-size: 28px; }
      .cards-track { padding: 10px calc(50vw - 80px); }
    }
    @media (min-width: 1024px) {
      .card-slot { width: 96px; height: 144px; margin: 0 -6px; }
      .card-slot:hover { margin: 0 10px; }
      .card-front .card-title { font-size: 16px; }
      .card-front .card-suit { font-size: 11px; }
      .card-front .card-num { font-size: 11px; }
      .cards-track { padding: 10px calc(50vw - 120px); }
    }
    @media (max-width: 480px) {
      .card-slot { width: 60px; height: 90px; margin: 0 -3px; }
      .card-slot:hover, .card-slot.highlighted { margin: 0 -1px; }
      .card-front .card-title { font-size: 11px; }
      .card-front .card-suit { font-size: 8px; }
      .card-front .card-num { font-size: 8px; }
      .card-back::after { font-size: 20px; }
      .result-card { padding: 28px 20px; }
      .result-name { font-size: 26px; }
      .result-interp { font-size: 15px; }
      .cards-track { padding: 10px calc(50vw - 40px); }
    }
  </style>
</head>

const OFFLINE_READINGS = {
  "愚者": "愚者踏上悬崖边缘，却望向天空——这不是鲁莽，而是对未知的全然信任。你正站在一个新旅程的起点，前方没有地图，但你的背包里装着所有需要的勇气。牌中的白色小花提醒你：最纯净的开始往往诞生于放下计划、放下恐惧的那一刻。现在的你不需要所有答案，迈出第一步本身就是答案。让好奇心做你的向导，相信宇宙会在你跳跃时铺好道路。今天，就去尝试一件你犹豫已久的小事，哪怕只是说出那个想了很久的想法。",
  "魔术师": "魔术师一手指天、一手指地，桌面上摆着圣杯、宝剑、权杖和钱币——所有元素都已就位。你不是缺少资源，而是还没意识到自己手握的力量。这张牌告诉你创造的时刻到了，将想法落地为现实，将灵感注入行动。你天生具备将无形化为有形的能力，专注力就是你的魔法棒。阶段性地检视自己手中的工具：你的技能、人脉、经验，哪一项还没被善用？把它们整合起来，你会发现组合产生的能量远超预期。",
  "女祭司": "女祭司端坐在神殿之门，膝上摊开的卷轴写着宇宙的秘密。她不急着开口，因为真正的智慧来自内在的静观。你正在被邀请进入内心深处，那些困扰你的问题，答案不在外界杂音中，而在你安静下来后的第一个直觉里。梦境、偶然的灵感和身体的感觉都是她在敲门。给自己留出独处的时间，关闭外界的噪音，哪怕只是十分钟的静坐，你会惊讶于内心传来的清晰声音。",
  "皇后": "皇后安坐于丰饶的麦田和森林间，她是大地之母的化身，代表孕育、滋养和感官的丰盛。你正在进入一个收获的周期——不论是物质上的回报，还是情感的滋养，都将如春日的花园般自然绽放。这张牌提醒你先照顾好自己的身体和情绪：好好吃饭、美美地睡一觉、享受一次温柔的自我犒劳。当你感到充实和满足，你自然成为周围人眼中的温暖光源。丰盛不是追逐来的，而是放松后自然流入的。",
  "皇帝": "皇帝端坐于石座之上，手握权杖，背后是绵延的山脉。他代表的不是专制的权威，而是清晰的边界和自律带来的自由。如果最近的你感到混乱或失控，这张牌邀请你建立结构和规则——制定一个计划、设定清晰的底线、用行动而非情绪做决定。秩序感会让你从焦虑中解放出来，因为你知道每一步都踩在坚实的基础上。今天，挑一件你一直拖延的事，为它划分出固定的时间和步骤，你会感受到掌控力回来的踏实感。",
  "教皇": "教皇举起祝福的手，两位信徒在他面前聆听教诲。这张牌指向传统的智慧、可靠的导师和社群的支持。也许你正需要一位值得信赖的人为你指点迷津，或者在某个领域寻求正统的学习路径。不必独自扛下所有问题，去请教那个你敬重的人，或加入一个志同道合的群体。分享本身就是一种疗愈，而古老的智慧之所以流传至今，正是因为它在关键时刻从未缺席。",
  "恋人": "恋人之牌不止于爱情，它代表着灵魂深处的选择与合一。天使拉斐尔在云端祝福，下方站着的是内心的两股声音——理性与感性、安全与冒险。你现在面临的选择不是对错之分，而是哪条路更贴近你的真心。不要问外界怎么看，静下来问自己：这让我感到完整吗？当选择出发于爱而非恐惧，你就已经走在对的路上。给自己一个安静的下午，写下每个选择的得与失，然后相信你的第一直觉。",
  "战车": "战车上的勇士驾着黑白双马，一个往左一个往右，但他的意志让它们共同前进。你的内心或许也有两股矛盾的力量在拉扯，但此刻不是犹豫的时候。这张牌宣告：你已经积累了足够的准备，是时候握紧缰绳、全力冲刺了。信心不是等来的，是在行动中长出来的。选一个你反复纠结的目标，今天为它走出一小步，哪怕只是发一封邮件或打一个电话，战车一旦启动，方向自会清晰。",
  "力量": "画面中的女子轻柔地合上狮子的嘴，没有对抗，只有从容的力量。真正的力量不是咆哮和征服，而是以柔克刚的智慧。你最近可能在面对外界的压力或自己内心的焦躁，这张牌提醒你：平静比爆发更有力量。当愤怒或焦虑升起时，先深呼吸三次，感受那股情绪像云一样飘过而不被它卷走。你的耐心和温柔不是软弱，而是最高级的力量形式。用包容取代对抗，你会发现那只狮子其实是自己的恐惧。",
  "隐者": "隐者手提一盏六芒星灯，独自站在雪山顶峰。这不是孤独，而是主动选择的庄严沉思。你在经历一段重要的内在探索期：也许感到与周围有些疏离，也许渴望从喧嚣中抽身。这不是逃避，而是灵魂在黑暗中为自己点灯。给自己留出一段不受打扰的时间，写日记、散步、或只是安静地喝茶。答案不在外面的世界里，在你内心深处那盏从未熄灭的灯里。当你准备好时，你带回来的光将照亮更多人。",
  "命运之轮": "命运之轮上刻着神秘的符号，不断旋转。那些看似偶然的相遇和转折，背后都有宇宙的精密安排。如果你正经历低谷，请记住轮子不会永远停在下方；如果你正站在高处，感恩这份幸运的同时也谦逊以待。此刻最好的姿态是顺应而非强求——像水一样，遇方则方，遇圆则圆。留意身边出现的巧合和机会，它们可能是命运递来的钥匙。顺势而为，你会发现自己被带向一个更广阔的舞台。",
  "正义": "正义女神手持宝剑和天平，双眼没有被蒙蔽。她带来的不是惩罚，而是因果的回归——你的每一份付出都会被看见，每一个选择都会结出果实。如果最近有些事情让你感到不公，请相信更大的秩序在运作。同时也要审视自己：哪些地方你对自己不够诚实？哪些决定需要你为自己的选择负起责任？真正的正义从内在开始，当你对自己坦率，外界的公平自会回应。今天不妨重新审视一个悬而未决的决定，带着诚实做出最终的决断。",
  "倒吊人": "倒吊人倒挂在树上，脸上却有一抹平静的微笑。他选择了这个视角——不是被迫，而是主动。当你觉得世界卡住了，不妨像他一样换个角度看：慢下来不是退步，是为了更清晰地看见。也许你需要暂停追逐某个目标，允许自己有一段悬停的时间。这段看似无为的时光，正在酝酿重要的内在转变。让你的思绪沉淀，那些原本看重的事可能会变轻，而真正重要的东西会浮出水面。",
  "死神": "死神骑马而来，脚下倒下的有国王也有平民——在终结面前人人平等。但仔细观察，远处有朝阳升起。这张牌很少代表肉体的死亡，而是旧有模式、关系或阶段的结束。那些不再适合你的事物正在被剥离，这让人不安，但也是为了给新生腾出空间。问问自己：是什么该放手了？一段不健康的关系、一份消耗你的工作、还是一个困住你的自我定义？放手不是失去，是解放，是让新的可能涌入的前提。",
  "节制": "天使将水从一只金杯倒入另一只，一脚踏在水上，一脚踏在岸上。这象征着调和与平衡——不激进亦不停滞，不极端取其中道。你正在被邀请找到生活各方面的黄金比例：工作与休息、给予与接受、理性与情感。当你感到节奏出现问题，不要试图一次性矫正所有，而是做一次微调：今晚早睡半小时、明天午休多走五分钟。小的平衡会积累成大的从容，不急不躁本身就是一种强大的力量。",
  "恶魔": "恶魔牌上的一对男女被锁链拴住，但那锁链其实很松——他们可以随时挣脱，只是选择了留下。这张牌指向你的执念和束缚：也许是物质、欲望、一段不健康的关系、或一个根深蒂固的自我怀疑。恶魔不是外部的敌人，而是内心那个告诉你\"不可能\"的声音。看清它就是你解放的第一步。今天，问自己一个问题：什么样的想法或习惯，如果放下，会让我的生活轻松许多？直面它的那一刻，锁链已经开始松动。",
  "高塔": "高塔被闪电击中，火焰和石块从高处坠落。这是最令人不安的一张牌，却也最能带来彻底的解放。那些摇摇欲坠的虚假安全感、不愿意面对的真相、建立在错误地基上的结构，在这一刻全部崩塌。短期来看是痛苦的，但长远而言，你将被释放到一个更真实、更坚实的基础上。当尘埃落定后，你会发现自己其实一直知道这座塔迟早要倒。拥抱这场清洗，然后从废墟中捡起真正有价值的材料，重新建造。",
  "星星": "少女在星光下将水倒入大地和池塘，空中闪耀着八颗星。经历了高塔的摧毁后，星星带来的是宁静的希望和疗愈。你不需要做什么惊天动地的大事，只需要像画面中的少女一样，坦然地倾倒你的爱与关怀。这段时期是脆弱的，也是真实的——允许自己感受疲惫，也允许自己被宇宙温柔地接住。抬头看看星空，古老的星光以几十万年为单位奔向你，你此刻的烦恼在宇宙的尺度里如此微小。洗个热水澡、点一盏蜡烛，你被祝福着。",
  "月亮": "月光下，一条小径蜿蜒消失在远处的群山间，螃蟹从水中爬出，两只狗对着月亮吠叫。这张牌走进潜意识的领域：恐惧、梦境、和那些说不清的不安。有些东西正在暗处搅动，你看不清全貌，但感受到它的存在。不要急于驱散这种不安——月亮邀请你在微光中前行，信任你的直觉比信任双眼更重要。今晚睡前记录你的梦境，或者写下那些反复出现的焦虑。一旦被命名，它们就失去了一半的力量。",
  "太阳": "太阳牌上，一个孩子赤身骑在白马上，向日葵在身后绽放。这是所有塔罗牌中最明亮的一张，象征纯粹的喜悦、成功和生命力。你已经走出了阴霾，现在的你是完整而闪耀的。不要害怕太过耀眼或太过快乐——尽情绽放是你的权利，也是你的礼物。去分享你的温暖、去庆祝你取得的每一个进步、去做一件纯粹因为喜欢而做的事。你的光芒不仅照亮自己，也会感染身边的每一个人。",
  "审判": "天使加百列在空中吹响号角，坟墓中的人们苏醒过来回应召唤。这不是外界的审判，而是内心深处的觉醒。一个沉睡已久的部分正在苏醒——也许是你压制的热情、被忽视的天赋、或一个搁置已久的梦想。你感受到一种无法言说的催促：是时候了。不要忽视这个内在的召唤，它是你灵魂的导航。今天做一件你一直想做但觉得\"不切实际\"的事，哪怕只是一个微小的开始，回应召唤的勇气本身就是重生。",
  "世界": "世界牌中，一个舞者在月桂叶环中优雅起舞，四角的四个形象代表四元素和完整的循环。它昭示一个阶段的圆满完成——你不是走完了路，而是完成了一个完整的圆。此刻值得被庆祝：回望你走过的每一步，那些挑战、失误和胜利都编织成了今天的你。但这也是新循环的开始：一个吻别之后，你将为下一个目标再次启程。花一点时间感恩这一程的所有遇见，然后带着积累的智慧，轻盈地走向下一圈。",
  "权杖王牌": "权杖王牌从云端伸出，握在手中的是一根正在发芽的权杖——这不只是一根木棍，而是火种，是灵感的第一次跳动。大地在远方招手，天空有八片叶子飘落，象征能量的初始喷射。你正被赋予一份崭新的热情：也许是创业的念头、创作的冲动、或者一个让你心跳加速的机会。王牌从不犹豫，它直接问你：你敢不敢握住它？不要等完美的时机，火元素不等人。今天，写下那个让你兴奋却迟迟没启动的想法，哪怕只是一个标题或一句话，行动的第一粒火星已经点燃。让它烧起来，世界会为你的热情让路。",
  "权杖二": "权杖二的主角站在城堡的高台上，一手扶杖，一手握着地球仪，远眺无垠的海平线。他已经有了地盘和积累，但内心知道：舒适区之外才有真正的王国。这张牌说的是规划而非行动——你到了一个需要抉择的节点：是守着现有的安稳，还是冒一次险去追求更大的可能？两把权杖固定在后墙，暗喻你拥有资源和支撑，缺的只是跨出那一步的决心。今天，列两份清单：一份是留在原地的得失，一份是走出去的可能。不是立刻做决定，而是诚实面对内心的野心。你的城堡很安全，但海那边的世界才是故事的下一个篇章。",
  "权杖三": "权杖三的画面里，一个人背对我们站在崖边，三根权杖扎根地面，船只正在远处航行。你的计划和耐心正在显化为可见的进展——那些前期投入的思考和准备，现在已经变成了航船上的帆。你不需要再推，只需要相信之前的布局正在生效。扩张的时机到了：也许是事业上的拓展、学习上的深造，或者一段关系的深化。今天，做一个「探险清单」：你一直想去但没有付诸行动的领域是什么？报名一门课、联系一位海外朋友、调研一个新市场。船已经出海，你要做的就是站在崖上目送它，然后准备迎接远方的回声。",
  "权杖四": "权杖四是一张纯粹的庆祝牌。四根权杖搭成花棚，人们手持花束在阳光下舞蹈，远处城堡安稳伫立。你完成了一个重要阶段——不是终点，而是一个值得停下来感恩的里程碑。这张牌邀请你在忙碌中按下暂停键，看看自己走了多远。不是虚荣的夸耀，而是健康的自豪：我做到了，我在这里。今天，做一件「庆祝」的事：请自己一顿喜欢的饭、给帮助过你的人发一条感谢消息、或者只是在落日下安静地坐一会儿。庆典之后，你会带着更饱满的能量继续上路，但此刻，先享受这一刻的圆满。",
  "权杖五": "权杖五描绘五个人各持权杖，方向不一、高低交错，看似混乱，却没有人真正受伤。这代表竞争、观点的碰撞和建设性的冲突。如果你最近感到周围充满杂音——同事的分歧、朋友的意见相左、或自己内心的多种声音打架——这不是坏事。摩擦产生火花，而火花孕育创意。你要做的不是逃避冲突，而是从中提炼出有价值的洞见。今天，把那些让你不舒服的分歧写下来，然后问自己：这些对立的声音各自在保护什么？竞争的尽头不是输赢，而是每个人都被激发出比安逸时更强大的自己。",
  "权杖六": "权杖六的主角骑在白马上，头戴桂冠，权杖上系着花环，人群簇拥左右。这是一张胜利之牌：你的努力被看见了，你正在获得认可和追随。但要记住，真正的领袖不是被欢呼声定义的，而是被责任感检验的。享受这一刻的荣耀，同时保持谦逊——那些为你鼓掌的人，未来可能需要你的指引和托举。今天，做一件事把聚光灯转向别人：公开感谢一位团队成员的贡献，或把你的经验整理成一段分享。胜利如果只停留在自己身上就会枯萎，传递出去才会生根。",
  "权杖七": "权杖七的画面中，一个人站在高处，双手紧握一根权杖，六根其他权杖从下方袭来。你被逼到了防守位——工作量激增、多方压力同时施压、或者有人挑战你的立场。但注意，他站的位置更高，这是优势。你不只是在抵抗，你是在守卫已经获得的成果。这张牌叫你坚持：不需要赢下每一场仗，只需要不放弃脚下的阵地。今天，列出你面临的「进攻」，给每一项标注优先级：哪些值得你全力回击，哪些可以放手。不是所有的战斗都需要赢，但核心的原则一步也不退。",
  "权杖八": "权杖八是速度最快的牌。八根权杖在空中平行飞驰，没有人物、没有地面——纯粹的动能，毫无阻力。好消息正在以加速传来：等待的回复、卡住的项目、悬而未决的决定，都将迎来突破。你要做的就是张开双臂迎接，而不是在高速流动中试图抓住每一根权杖。顺势比控制更重要。今天，扫清那些你一直在拖延的杂事，为即将到来的快节奏腾出跑道。信息会密集抵达，保持清醒比反应过快更明智。像箭一样，方向对了，速度自然会带你抵达。",
  "权杖九": "权杖九里，一个人头缠绷带，站在八根权杖围成的栅栏后，神情警惕而疲惫。你已经经历了战斗，身上带着伤，但还没有倒下。这张牌说的是「最后的坚持」——你已经走了九成路，现在筋疲力尽但离终点很近。不要因为疲惫就推翻之前的努力，也不要在最后关头松懈。绷带是勋章，不是耻辱。今天，允许自己承认累，但同时也盘点一下：你已经克服了什么？哪些困难放在三个月前根本不敢想象？最后的关卡往往最磨人，但也最不值得放弃。你比自己以为的更有韧性。",
  "权杖十": "权杖十的主角抱着十根沉重的权杖，弯腰前行，完全看不见前方的路，只看得见脚下的一小块地。你扛得太多了——责任、期待、义务，一层一层堆叠到视线被遮蔽。这张牌不是表扬你的勤劳，而是敲警钟：如果不放下一些，你连方向都会失去。问自己：这十根权杖里，真正属于你的有几根？哪些是别人的期望被你内化成了自己的负担？哪些可以转交、外包、或者干脆说不？今天，写下来你肩上所有的「权杖」，然后挑出三根可以放下的。不是所有的重量都值得你弯腰。",
  "权杖侍从": "权杖侍从站在阳光充足的沙漠中，手扶一根比他还要高的权杖，眼神里全是好奇和跃跃欲试。这是火元素的第一声试探——你不是已经有了完整计划的人，你是那个收到了宇宙的灵感电报、正兴奋得想马上回复的新人。不要因为经验不足而羞于冒险，侍从最珍贵的就是这种未经世故的热忱。今天，像第一次接触那样去对待一件事：放下「我已经懂了」的预设，重新提问、重新尝试。一封冒失的申请、一次即兴的表达，都可能比你精心安排的策略更有效。",
  "权杖骑士": "权杖骑士策马狂奔，权杖高举，斗篷和火焰般的鬃毛一起向后飞扬。他没有侍从的青涩，也没有国王的持重——他是纯粹的行动主义者，冲动但耀眼。如果你正在某个项目的中途感到热血上头、想全力冲刺，这张牌说：去吧，但要记得骑士容易跑太快而忽略细节。热情是你的加速器，但地图还是要带在身上。今天，选一件你充满激情的事，给它一天的量，拿出骑士的速度去执行。同时留五分钟检查：方向对吗？马需要喝水吗？速度与清醒可以并存。",
  "权杖王后": "权杖王后端坐王座，手中权杖顶端盛开着向日葵，一只黑猫蹲在脚边。她代表了火元素的成熟女性面——不是冲锋陷阵的火，而是温暖持久的炉火。你被邀请以自信而不张扬的姿态领导你的世界：家庭、团队、或自己的创作。她既有行动力也有包容心，能在忙碌中保持优雅。今天，以「王后」的视角做一件事：不急于证明自己，而是创造一个让他人也感到被看见的空间。给同事一句真诚的赞美、给家人一顿不用匆忙的晚餐。真正的力量，从不需要大声宣告。",
  "权杖国王": "权杖国王身着火红披风，端坐王座，一手握权杖、一手搁于膝上——他的力量已经完全内化了。他不需要证明什么，眼神里是经历过无数次火的淬炼之后的平静与远见。你被召唤成为自己领域的国王：不是靠权力压制，而是以远见引领。设定清晰的目标，果断做出决定，并用你的稳定感染周围的不确定。今天，在一件你一直在犹豫的事上做出决断，并以国王的担当为这个决定负责。不是所有选择都完美，但拖而不决才是真正的失职。",
  "圣杯王牌": "圣杯王牌中，一只手从云端伸出，托着一只满溢的圣杯，五道水流倾泻而下，落入下方盛开的莲花池。白鸽衔着圣饼飞向杯中——这是灵魂层面的丰盛之礼。情感的源头已经打开，新的恋情、深化的友情、或一种久违的对生活的柔软感受力正在涌入。你不需要去寻找爱，它已经在寻找你。今天，做一件让心变柔软的事：听一张老唱片、写一封不寄出的信、或者只是闭上眼睛回想一个让你温暖的瞬间。杯子满了，自然就会溢出馈赠给周围的人。",
  "圣杯二": "圣杯二中，一男一女彼此对视，各自手持一只圣杯，上方是长着翅膀的狮头——赫耳墨斯的权杖，象征灵魂的契合和沟通。这不是偶然的邂逅，而是一种深刻的互相确认：在你看向对方的时候，看到了自己被理解的可能。可能是恋人的表白、合作伙伴的信任握手、或者一位老友终于说出了心里话。今天，走向那个你一直在意的人，不需要精心设计的措辞，只需真诚的表达。一支圣杯举起，另一支自然会回应。给予和接收之间的弧线，就是人类之间最神圣的桥梁。",
  "圣杯三": "圣杯三的画面洋溢着纯粹的欢愉：三位女子高举圣杯，在丰收的田野间舞蹈庆祝。这是友谊、合作和共享快乐的牌。你不必独自承担一切——身边有可以一起笑、一起哭、一起庆祝小胜利的人。你最近可能太专注于「做」，忽略了「在」。这张牌温柔地提醒你：联系那些你想念的人，组织一次没有议程的聚会。今天，给一位朋友发一条具体的赞美——不是客套的问候，而是你真心欣赏他或她哪一点。快乐的最高形式，是被分享的快乐。",
  "圣杯四": "圣杯四描绘一个人坐在树下，双臂交叠，凝视面前的三只杯子，对云端伸出的第四只杯视而不见。你感到厌倦、不满、或对已有的事物提不起兴趣，好像什么东西缺失了，但说不清楚。这种情绪不是错的，而是内心在告诉你：你需要的不只是更多的选择，而是更深的意义。今天，不要逼自己「积极起来」。允许自己安静地坐在树下，写下三件你曾经充满热情但现在感到平淡的事。那份第四只杯——新的可能性——其实就在你身边，等你不再盯着已有的三只杯子时，就会看见。",
  "圣杯五": "圣杯五的画面是整副牌中最悲伤的之一：黑色斗篷的人低头看着三只倾倒的杯子，红色液体洒了一地。但身后还有两只杯子立着，河上有一座通往城堡的桥。你正在哀悼某个丧失——一段感情、一个机会、或曾经深信的理念。这是健康的悲伤，但请注意：你把全部目光都给了倒下的三杯，而身后依旧立着的两杯却被忽略了。今天，允许自己哀悼，但同时写下一个「还在」的清单：那些仍然存在、仍然爱你、仍然属于你的人和事。桥就在身后，等你准备好走过去。",
  "圣杯六": "圣杯六的画面笼罩在温暖的怀旧色调里：一个大孩子把装满花的杯子递给一个小孩子，背景是安静的庭院和老房子。你正在被某种过去的温暖触动——也许是一首老歌、一张旧照片、或突然涌上的童年记忆。这不是逃避现实，而是灵魂在提醒你：你的根是甜的，那些纯净的善意曾经存在，现在也依然是你的一部分。今天，去做一件「回到童年」的事：吃一口小时候最爱的零食、翻翻旧相册、或者抱抱你的家人。纯真不在过去，它可以被重新唤醒。",
  "圣杯七": "圣杯七的云朵上悬浮着七只圣杯，每只杯子里冒出不同的幻象：城堡、珠宝、桂冠、龙、蛇、蒙面人、发光的人像。这是想象力和欲望的交织——你面前突然涌现太多选择，每一个都闪耀但虚幻。注意：这些都是云上的泡影，还没有一个是落地的。你需要的不是选择，而是先回到地面。今天，从这七只杯子中选出三只真正让你心跳加速的，然后问：它们需要什么样的条件才能从云上落到现实中？幻象不是敌人，沉迷才是。",
  "圣杯八": "圣杯八的画面中，一个人背对整齐堆叠的八只圣杯，拄杖走向远方的荒山。月亮在夜空中挂着缺口。你已经完成了某种积累——也许是一份工作、一段关系、或一个阶段——但内心知道，这里不再是你的终点。离开不是因为不满，而是因为完整。八只杯子已经喝完了，你再待下去只是重复自己。今天，梳理一下你生命中的「圣杯」们：哪些是你已经喝完的？哪些关系或习惯已经完成了它们在你生命中的使命？走开不是背叛过去，而是尊重未来的自己。",
  "圣杯九": "圣杯九被称为「愿望牌」。主角双手交叠坐在精致椅子上，身后九只圣杯整齐排列，表情满足而自信。你的内心愿望正在显化为现实——不是因为运气，而是因为你前期的情感投入和真诚付出正在回馈你。物质与情感双丰收的时刻。今天，做一次「愿望检视」：你之前真心想要的东西，是否正在以某种方式进入生活？感恩这些实现，同时意识到：满足不是终点，而是下一个愿望的起点。一个满足的人发出的愿望，比一个匮乏的人发出的更有力量。",
  "圣杯十": "圣杯十描绘一个家庭——夫妻张开双臂仰望天空，两个孩子在一旁舞蹈，十只圣杯在彩虹中排列。这是情感满足的最高象征：和谐的家庭、深度的归属、无条件的爱。你不需要去争取什么，只需要感受你已经拥有的。也许你的生活并不完美，但在某些重要的关系里，你已经拥有了「家」的感觉。今天，用行动向爱你的人表达：做一顿饭、写一张便条、或只是安静地一起坐一会儿。彩虹不在遥远的天边，它在你们共同仰望的那一刻已经完整。",
  "圣杯侍从": "圣杯侍从从圣杯中探出身子——他本身就是水元素的信使，手中一条鱼探头与他对话。这是灵感和创造性直觉的萌动。你可能收到一个关于艺术项目、情感表达或心灵探索的新想法，它看起来很小甚至有些天真，但不要忽视它。侍从告诉你：以初学者的心态去探索，不必完美。今天，尝试一种你从未用过的表达情感的方式：画画、写诗、或只是用不一样的词说出「我关心你」。那条鱼——你的潜意识——正在告诉你一些事情，耐心听。",
  "圣杯骑士": "圣杯骑士骑在白马上缓缓前行，手持圣杯，姿态优雅却带着某种疏离。他是梦想的追寻者、浪漫的提案者、艺术的践行者。如果你正被一个美丽的愿景牵引，这张牌鼓励你去追随——但要记得，骑士有时会因为太沉醉于理想而忽略了现实的细节。今天，把你那个「最美版本的未来」写下来，然后在每个愿景旁边加一行：实现它的第一步是什么？梦需要翅膀，也需要跑道。做那个把玫瑰摘下来放在你桌上的人，而不只是远远欣赏它的美。",
  "圣杯王后": "圣杯王后坐在海边的宝座上，凝视着手中华美的圣杯，杯盖上有天使的浮雕。她是直觉力的顶峰——共情但不被情绪淹没，敏感但不脆弱。你被邀请进入一种深度的倾听状态：倾听自己的梦、身体的信号、和他人的未尽之言。今天，在各种声音中练习「不急着回复」：朋友倾诉时先听完、自己焦虑时先感受而不评判。王后的法力不在于掌控水的流向，而在于她能安静地映照出水的所有层次。你内心深处知道答案，只是需要安静下来去看。",
  "圣杯国王": "圣杯国王端坐于海上浮起的王座，手握圣杯和权杖，周围波涛汹涌而他的面容沉稳如水。他是情感领域的成熟掌控者——不是压抑感受，而是能在风暴中心保持定力。你在情绪管理上达到了一个新高度：能体察他人的感受而不被卷入，能安慰弱者而不消耗自己。今天，以国王的智慧处理一件情感议题：面对冲突时先冷静三秒、给出建议前先确认对方真正需要什么。真正的情商不是讨好所有人，而是知道什么时候该出手，什么时候只需要沉默的陪伴。",
  "宝剑王牌": "宝剑王牌从云端伸出，剑尖挑着金色王冠，背后是绵延的山脉。这是真理之剑——它劈开迷雾、斩断谎言，带来清澈的洞见。你正获得一次关键的思想突破：一个问题的答案突然清晰，一个困扰你的困惑被一句话解开。风元素的锋利在于它不给人留情面，但它给你自由。今天，对一件你长期逃避或自我欺骗的事说出真实的看法——先对自己说，再对可能需要听到的人说。真理在最初可能刺人，但它割开的伤口比谎言造成的溃烂更健康。",
  "宝剑二": "宝剑二的主角蒙着双眼，双手交叉持剑，坐在石凳上，背后是平静的海面和一轮新月。你在有意识地回避一个决定——不是不知道答案，而是怕面对答案的后果。两把剑交叉在心口：理智告诉你A，情感偏向B，于是你选择蒙上眼睛。但这种平衡是脆弱的，手总会酸。今天，摘下面纱做一次练习：写下这个决定的最坏可能，然后问自己「我能承受吗」。通常你会发现，清醒的痛比蒙眼的悬置更仁慈。放下剑，你不会碎。",
  "宝剑三": "宝剑三是整副牌中情感冲击最直接的：三把剑穿透一颗心，背景是灰色云层和绵密的雨。它代表心碎、背叛和锐利的悲伤。你没有做错什么，痛苦就是来了。但请注意：三把剑都干净地刺入，没有撕裂——这是一种可以愈合的伤。不要逃避这份痛，它需要被完整地感受。今天，给自己一个「哀悼仪式」：写一封不寄出的信，把所有的痛倒进去，然后点火烧掉或撕碎冲走。乌云背后是晴空，但你必须先让雨下透。穿越比绕过更快。",
  "宝剑四": "宝剑四描绘一个人双手合十躺在教堂的石床上，三把剑挂在墙上，一把剑横置于身体下方。你在经历精神上的枯竭：过度思考、焦虑循环、或失眠。这是强制静修的信号——不是懒散，是必要的休整。墙上的三把剑代表你暂时搁置的问题，它们不会消失，但此刻你需要的是让大脑冷却。今天，做一次「思维断食」：关闭社交媒体一小时，不阅读任何引发焦虑的信息，只是躺着、散步、或做手工。最好的洞见往往在你停止追逐它的时候悄然到来。",
  "宝剑五": "宝剑五的画面中，三人背对离去，前面的人抱着三把剑，脸上带着胜利的冷笑。地上散落两把剑。你赢了一场争论或博弈，但代价是关系的裂痕。胜利者并不真正快乐——他只是捡起了所有剑，而另外的人选择了离开。这张牌问你：这个赢值得吗？你是愿意一个人抱着三把剑站在空地上，还是愿意放下其中一些剑，和重要的人一起走？今天，在某个立场之争里，试着说一句「也许你是对的」，然后留白。胜利感很短暂，关系却很长久。",
  "宝剑六": "宝剑六的主角撑着船，载着六把剑和一位裹着斗篷的人，驶向远处的河岸。河水静默，天光微亮。你正在从一段艰难时光中过渡——不是已经好了，而是正在离开。船头的六把剑代表你带着的伤痛和教训，它们没有被丢掉，但被安放在了船的这头，不再横在胸口。今天，承认自己还带着一些东西，但也告诉自己：我正在移动，我在离开那个风暴的中心。不需要马上「好起来」，只要船在走，就是进步。彼岸还很远，但风向是对的。",
  "宝剑七": "宝剑七描绘一个人踮着脚尖，偷偷抱起五把剑溜走，身后两把剑还插在地上。他神情狡黠又紧张。这是一张关于策略和「非正面交锋」的牌。你可能需要以迂回的方式达成目标——不靠蛮力，靠巧劲。不是说谎或欺骗，而是选择在规则之内走出意料之外的路径。今天，如果你被某个问题正面挡回，思考第三种方案：绕过去、从下面钻过去、或干脆换个游戏玩。不是所有战斗都需要你站在阵前，有时候悄悄地把剑拿走就已经赢了。",
  "宝剑八": "宝剑八的画面令人窒息：一个女子被蒙住眼睛，被绳索和八把剑围困在泥地中。但她的腿没有被绑住，远处城堡就在视野之外。你感觉被困住了——但困住你的更多是信念而非现实。那些剑代表的「不能」「不应该」「太晚了」都是自己想出来的栅栏。今天，写下那些你认为自己不行的事，然后逐一问：这是事实还是观点？有没有哪怕一个反例？通常你会发现，蒙眼的布是自己系上的，城堡（自由）比你想象的更近。",
  "宝剑九": "宝剑九的主角半夜从床上坐起，双手捂脸，墙上挂着九把剑。这是整副牌中最贴近「深夜焦虑」的画面：辗转反侧、思虑过度、最坏想象在黑暗中被无限放大。你正在经历一段精神折磨期，但请注意，墙上的剑是悬着的——它们没有刺向你，只是你的恐惧让它们看起来无比真实。今天，给自己一件「锚点事物」：一个味道、一首歌、或一件触感柔软的织物。当焦虑来袭时，用它把意识拉回当下。凌晨三点的恶魔通常天一亮就消失了。",
  "宝剑十": "宝剑十是最绝望的一张牌：一个人面朝下倒在血泊中，十把剑刺穿他的身体。但远处金色的曙光正在升起，黑云开始变淡。这代表一个彻底的结束——你可能被背叛了、失败了、或者一段路走到了无以为继的尽头。但是，没有比这更低的地方了。谷底是重建的起点。今天，允许自己感受这份「到底了」的虚无，同时看向远方的那一抹光。十把剑结束了旧的故事线，太阳照常升起，新的故事从你决定站起来的那一刻开始。",
  "宝剑侍从": "宝剑侍从双手持剑，站在风中，剑尖朝上，警惕地观察四周。他是思想的学徒——具有敏锐的分析力、强烈的求知欲，但经验尚浅，容易把所知的一点点当成全部。你被邀请保持一种「观察者」的清醒：收集信息、提出疑问，但不急着下结论。今天，就一个你感兴趣的议题做一次「信息采集」：阅读不同立场的观点，写下各自的论据，不站队。侍从的剑是未开刃的——它的价值不在于杀敌，而在于让你学会如何辨别锋芒。",
  "宝剑骑士": "宝剑骑士跃马冲锋，剑高举过头，斗篷和马的鬃毛被风吹成一条直线。他是速度与决断的化身——但你也可以从他的眼神里看到某种狂热的偏执。你正处于一种「必须马上做点什么」的紧迫感中，这张牌说：行动是对的，但方向需要检查。骑士容易冲向错误的目标，因为太快而来不及分辨。今天，在冲锋之前，先花十分钟写下来：我的目的是什么？如果速度减半，结果会更好吗？风元素的力量在精准，不在蛮干。",
  "宝剑王后": "宝剑王后端坐于云端之上的王座，一手持剑、一手伸出授受，面容坚毅而略带忧伤。她是经历过大风大浪之后的理性王者——她的锋利不来自刻薄，而来自惨痛的经验使她能一眼看穿本质。你正在学习一种「清醒的慈悲」：既能共情，又能保持边界。今天，用王后的视角处理一件需要决断的事：不带情绪地分析事实，然后果断地做出取舍。不是心硬，而是你知道有些「好」需要牺牲才能成全。剑在她手中是秤，不是刀。",
  "宝剑国王": "宝剑国王端坐宝座，身着铠甲，手持一把立剑——他不像王后那样经历过直接的伤痛，但他通过理性的极端训练达到了思想的统治力。他是法官、策略家、智慧的仲裁者。你被召唤以冷静的逻辑审视你的处境，剥离情绪后看清真相。今天，拿出一件让你纠结的事，像法官一样审它：控方辩方各陈述什么？证据链是否完整？最终判决是什么？注意，国王的力量也有阴影：过于理性会让人显得冰冷。在给出判断时，加一句「我理解这对你来说很难」——既是剑锋，也是剑鞘。",
  "星币王牌": "星币王牌从云端伸出，掌心托着一枚巨大的金色星币——五角星中央浮现一扇门，通向繁花盛开的花园。这是物质世界向你递来的钥匙：一笔意外的收入、一个赚钱的机会、或一项可以持久经营的技能基础。与权杖的冲动不同，星币是稳扎稳打的承诺：土元素从不着急，但它从不落空。今天，评估一下你的「财务土壤」：有哪些资产或技能被闲置了？哪些微小的投入可以长期复利？握住这枚金币，然后耐心地种下它，秋天会有答案。",
  "星币二": "星币二的主角像杂耍艺人一样摆弄着两枚星币，∞形缎带将它们连在一起，背景的海上船只在波涛中起伏。你正在同时维系两种平衡：收入和支出、主业和副业、工作与家庭。船在晃，但你手上的节奏没有乱。这张牌说的是动态平衡——你不必站在稳固的陆地上，只要保持手上的循环不中断。今天，列出你所有的「资金流」和「时间流」，找到那个无限循环中的节点：哪里有漏洞？哪里可以更平滑？杂耍的秘诀不是每球都高，而是节奏比你想象的更坚实。",
  "星币三": "星币三描绘三个人在教堂中共同作业：雕刻师、修士和建筑师各持其职，三枚星币嵌在拱门上。这是团队协作和精进技艺的经典画面——你不是一个人在建造，而你的每一项技能都是大结构的一部分。你处于一个「学徒到匠人」的过渡期：已经开始被认可，但还需要在特定领域深耕。今天，检视自己的核心技能：哪一项需要再强化一成？哪一个合作让你受益最多，对方需要你做些什么来回馈？伟大建筑之所以不倒塌，是因为每一块石头都认真打磨过。",
  "星币四": "星币四的主角紧紧抱着一枚大星币，头顶一枚、脚下两枚——他占据了财富却面容警觉而封闭。你正在过度守护已有的东西：可能是钱、时间、或情感，生怕付出就会失去。安全感当然重要，但如果抱得太紧，你会发现自己什么都握不住——因为你的手臂无法再去接新的礼物。今天，做一个小实验：在某个你一直「省着用」的领域（钱、精力、赞美），主动多付出一点。很多时候，松开一点反而有更多流进来。囤积是匮乏的仪式，分享才是丰盛的证明。",
  "星币五": "星币五的画面在大雪纷飞的夜晚，两人衣衫褴褛走在教堂窗外。玻璃窗透出温暖的光和五枚星币，但他们没有进去——也许他们觉得自己不被欢迎，也许他们根本没注意到那扇门是敞开的。你可能正经历物质或精神上的困顿，感到被排除在丰盛之外。但请仔细看：教堂的灯是亮的，门是可以推开的。今天，问自己：我在哪些地方「假设」自己不被接纳？有没有一个求助的可能是我没有尝试的？困顿有时不是因为没有路，而是因为我们低了头没看见入口。",
  "星币六": "星币六描绘一位商人手持天平，将金币分发给两位跪着的穷人。天平在手，星币均衡分发。这是关于给予和接收之间的平衡、以及资源分配的智慧。你可能处在施与者或接收者的位置——无论哪边，关键都在「公平」二字。如果你在帮别人，不要过度牺牲；如果你在接受帮助，不要觉得低人一等。今天，检视你的「星币账本」：你在哪些地方付出了远多于回报？又在哪些地方索取多于需求？平衡不等于精确对等，而是双方都感到被尊重。",
  "星币七": "星币七的主角拄着锄头站在一株已结果的星币树前，表情混合着疲惫与审视。七枚星币挂在枝头，尚未采摘。你已经投入了很长时间的努力——一项技能、一份事业、或一段关系——现在到了阶段性评估的时刻。果实就在眼前，但还需要决定：现在收获还是再等一个周期？今天，做一次「成长审计」：列出你过去六个月投入了最多时间的三件事，评估回报是否符合预期？哪些值得继续浇水，哪些该换土重种？农夫的智慧不在于拼命干，而在于知道什么时候摘。",
  "星币八": "星币八的主角坐在长凳上，专注地雕刻星币，已经完成了七枚挂在墙上，第八枚正在手中成型。他沉浸在这个重复而熟练的动作里，仿佛世界只剩他和手中之物。这是「匠人精神」的极致展现：一万小时定律在此刻闪光。你不需要更大的愿景或更复杂的策略，你只需要每天打磨——日复一日的专注本身就是最大的竞争力。今天，锁定一项专业技能或健康习惯，用「星币八」的态度对待它：今天做的这次练习，是未来五年功力的其中一锤。每一锤都算数。",
  "星币九": "星币九是物质独立与优雅的象征：一位穿着华服的女子在葡萄园中漫步，左手抬起，旁边一只戴头巾的鸟儿——她的精神是驯化的。九枚星币散落在葡萄藤后。你已经通过自己的努力实现了经济自足或个人空间的独立，现在享受这份成果是你的权利。不需要焦虑「下一个目标是什么」，此刻停下来欣赏自己的园子是修行的一部分。今天，做一件纯粹为享受的事：穿一次你舍不得穿的衣服、开一瓶存了很久的酒、或只是在洒满阳光的窗前坐一下午。你配得上此刻的丰足。",
  "星币十": "星币十描绘一个大家族的庭院：祖父坐在拱门下，一对夫妇、孩子和两条狗围绕着，十枚星币排列成生命之树的图案。这是物质传承与家族繁荣的象征——你建立的不只是财富，而是一个可以被后代延续的体系。也许是事业的成熟、也许是家族的积蓄、也许是你留下的作品或影响力。今天，从一个「百年之后」的尺度来审视你正在做的事：什么会留下？什么只是一个季节的落叶？建立传承不需要宏大，只需要持续地在某事上超越自己的寿命周期。",
  "星币侍从": "星币侍从双手捧着星币，专注凝视，仿佛里面藏着整个世界的秘密。他代表学习的起点——对一门手艺、一项投资、或一套工作方法的执着钻研。你不是专家，但拥有用不完的耐心和求知欲。这张牌鼓励你把脚扎进泥土：报名一门线下课、开始记账、或跟着一位师傅从最基础的做起。今天，选一个实用技能，每天固定投入半小时，连续七天。侍从的力量在于「只问耕耘」——他还没看见树，但他相信种子。土元素最慢，但也最稳。",
  "星币骑士": "星币骑士骑在黑骏马上，持币不动，静静凝望前方。他是土元素的实践使者——不追求速度、不在乎风向，只问是否扎实、是否有用。你被邀请以这种稳定而专注的姿态推进手头事务：也许是一个需要耐心打磨的方案、或一项不能取巧的工作。骑士不会冲进战场，他会先确认马匹的铁蹄是否稳妥。今天，做一次「质量巡视」：你手头最重要的那个任务，哪些细节被忽略了？骑士的成功秘诀不是策略有多精妙，而是每一步落地时都踩出了蹄印。",
  "星币王后": "星币王后怀抱星币，端坐于草木繁茂的王座上，目光温柔而深沉。她是物质的滋养者、家庭的守护者、和实用智慧的化身。她不靠野心驱动，而是以照顾和培育为乐——无论是养育一个孩子、经营一个家、还是经营一份事业，她都在「让事物生长」。今天，以王后的身份做一件事：用你的资源和能力去滋养另一个人或一个项目，不求立刻回报，只问「这能生长吗」。你的富足不在于你的钱袋鼓不鼓，而在于你的存在让周围是否变得更肥沃。",
  "星币国王": "星币国王坐在满是藤蔓和城堡的宝座上，脚踏泥土，手持星币和权杖。他是财富与实业领域的最终成就者——他的富有不张扬，但深厚到可以支撑起一座城。你被召唤以「国王」的姿态管理你的物质世界：制定长远的财务计划、建立经得起冲击的体系、用已有的积累去推动更大的事。今天，做一件帝王级的财务决策：整理资产清单、规划未来三年的收入结构、或为一项你相信的事业投入一笔种子资金。国王不消费，他投资。"
};

// ===== DOM =====
const statusEl = document.getElementById('status');
const cardsTrack = document.getElementById('cardsTrack');
const cardsScroll = document.getElementById('cardsScroll');
const resultOverlay = document.getElementById('resultOverlay');
const resultIcon = document.getElementById('resultIcon');
const resultName = document.getElementById('resultName');
const resultEn = document.getElementById('resultEn');
const resultInterp = document.getElementById('resultInterp');
const resultClose = document.getElementById('resultClose');

// ===== 状态 =====
let isProcessing = false;
let cardSlots = [];
let pickedIndex = -1;
let highlightedSlot = null;

// ============================================
//  构建牌组（立即执行，0 外部依赖）
// ============================================
function buildCards() {
  cardsTrack.innerHTML = '';
  cardSlots = [];
  TAROT_CARDS.forEach((card, i) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.dataset.index = i;
    slot.setAttribute('role', 'button');
    slot.setAttribute('aria-label', card.cn + ' ' + card.en);
    const isMajor = card.suit === 'major';
    const displayTitle = isMajor ? card.cn : card.cn.replace(card.suitCn, '');

    // 长按进度环（SVG）
    const ringHTML = `
      <div class="long-press-ring">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="46" stroke-dasharray="0" id="ring-${i}"></circle>
        </svg>
      </div>
    `;

    slot.innerHTML = ringHTML + `
      <div class="card-inner">
        <div class="card-face card-back">
          <div class="card-back-inner"></div>
        </div>
        <div class="card-face card-front">
          <div class="card-num">${String(i).padStart(2,'0')}</div>
          <div class="card-suit">${card.suitCn}</div>
          <div class="card-title">${displayTitle}</div>
        </div>
      </div>
    `;
    cardsTrack.appendChild(slot);
    cardSlots.push(slot);

    // 绑定触摸/鼠标事件
    bindCardEvents(slot, i);
  });

  // 初始滚动到中间
  setTimeout(() => {
    const mid = cardsScroll.scrollWidth / 2 - cardsScroll.clientWidth / 2;
    cardsScroll.scrollLeft = mid;
  }, 80);
}

// ============================================
//  触摸/鼠标交互事件绑定
// ============================================
function bindCardEvents(slot, index) {
  let touchStartTime = 0;
  let touchMoved = false;
  let longPressTimer = null;
  let lastTapTime = 0;
  const LONG_PRESS_MS = 600;
  const DOUBLE_TAP_MS = 400;
  const MOVE_THRESHOLD = 10;

  function clearHighlight() {
    if (highlightedSlot) {
      highlightedSlot.classList.remove('highlighted');
      highlightedSlot = null;
    }
  }

  function startLongPress() {
    slot.classList.add('pressing');
    const ring = slot.querySelector(`#ring-${index}`);
    if (ring) {
      const circumference = 2 * Math.PI * 46;
      ring.setAttribute('stroke-dasharray', circumference);
      ring.setAttribute('stroke-dashoffset', circumference);
      // 动画填充
      let start = performance.now();
      function fillRing(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / LONG_PRESS_MS, 1);
        ring.setAttribute('stroke-dashoffset', circumference * (1 - progress));
        if (progress < 1 && slot.classList.contains('pressing')) {
          slot._ringRAF = requestAnimationFrame(fillRing);
        }
      }
      slot._ringRAF = requestAnimationFrame(fillRing);
    }

    longPressTimer = setTimeout(() => {
      if (!touchMoved && !isProcessing && !slot.classList.contains('flipped')) {
        cancelRingAnimation(slot);
        slot.classList.remove('pressing');
        clearHighlight();
        pickCard();
      }
    }, LONG_PRESS_MS);
  }

  function cancelLongPress() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    slot.classList.remove('pressing');
    cancelRingAnimation(slot);
  }

  function cancelRingAnimation(s) {
    if (s._ringRAF) { cancelAnimationFrame(s._ringRAF); s._ringRAF = null; }
    const r = s.querySelector('circle');
    if (r) r.setAttribute('stroke-dasharray', '0');
  }

  // === Touch Events ===
  slot.addEventListener('touchstart', function(e) {
    if (isProcessing || slot.classList.contains('flipped')) return;
    e.preventDefault();
    touchStartTime = Date.now();
    touchMoved = false;

    // 高亮
    clearHighlight();
    slot.classList.add('highlighted');
    highlightedSlot = slot;

    // 启动长按计时
    startLongPress();
  }, { passive: false });

  slot.addEventListener('touchmove', function(e) {
    if (isProcessing || slot.classList.contains('flipped')) return;
    const touch = e.touches[0];
    const rect = slot.getBoundingClientRect();
    const dx = touch.clientX - (rect.left + rect.width / 2);
    const dy = touch.clientY - (rect.top + rect.height / 2);
    if (Math.abs(dx) > MOVE_THRESHOLD || Math.abs(dy) > MOVE_THRESHOLD) {
      touchMoved = true;
      cancelLongPress();
      slot.classList.remove('highlighted');
      highlightedSlot = null;
    }
  }, { passive: false });

  slot.addEventListener('touchend', function(e) {
    if (isProcessing || slot.classList.contains('flipped')) return;
    e.preventDefault();
    cancelLongPress();
    slot.classList.remove('highlighted');
    highlightedSlot = null;

    if (touchMoved) return;

    const now = Date.now();
    const duration = now - touchStartTime;

    // 短按：检测双击
    if (duration < LONG_PRESS_MS) {
      if (now - lastTapTime < DOUBLE_TAP_MS) {
        // 双击触发抽牌
        lastTapTime = 0;
        pickCard();
      } else {
        lastTapTime = now;
        // 单击：短暂高亮反馈
        slot.classList.add('highlighted');
        highlightedSlot = slot;
        setTimeout(() => {
          if (highlightedSlot === slot) {
            slot.classList.remove('highlighted');
            highlightedSlot = null;
          }
        }, 300);
      }
    }
  }, { passive: false });

  // === Mouse Events (桌面端) ===
  slot.addEventListener('dblclick', function(e) {
    if (isProcessing || slot.classList.contains('flipped')) return;
    cancelLongPress();
    clearHighlight();
    pickCard();
  });

  slot.addEventListener('mousedown', function(e) {
    if (isProcessing || slot.classList.contains('flipped')) return;
    clearHighlight();
    slot.classList.add('highlighted');
    highlightedSlot = slot;
    startLongPress();
  });

  slot.addEventListener('mouseup', function(e) {
    cancelLongPress();
    if (highlightedSlot === slot) {
      slot.classList.remove('highlighted');
      highlightedSlot = null;
    }
  });

  slot.addEventListener('mouseleave', function(e) {
    cancelLongPress();
    if (highlightedSlot === slot) {
      slot.classList.remove('highlighted');
      highlightedSlot = null;
    }
  });
}

// ============================================
//  洗牌动画（RAF驱动 + 间距伸缩 + 透明度变化 + 轻微旋转）
// ============================================
function shuffleAnimation() {
  return new Promise(resolve => {
    const totalFrames = 50;
    let frame = 0;
    const baseMargins = cardSlots.map(() => -5);

    function step() {
      if (frame >= totalFrames) {
        cardSlots.forEach((slot, i) => {
          slot.style.transform = '';
          slot.style.margin = '';
          slot.style.opacity = '';
          slot.classList.remove('shuffling');
        });
        resolve();
        return;
      }

      const progress = frame / totalFrames;
      const intensity = Math.sin(progress * Math.PI) * 1.0;
      const jitter = Math.sin(progress * Math.PI * 4.7) * 0.35 * (1 - progress);

      cardSlots.forEach((slot, i) => {
        if (!slot.classList.contains('flipped')) {
          const phase = (i * 0.15 + progress * 1.3);
          const idxFactor = Math.sin(i * 0.55) * 0.5 + Math.cos(i * 0.31) * 0.5;
          const offsetX = Math.sin(phase * 3.2) * 35 * intensity * idxFactor + jitter * 15;
          const offsetY = Math.cos(phase * 2.7) * 18 * intensity * idxFactor;
          const rotZ = Math.sin(phase * 3.9) * 14 * intensity * idxFactor;
          const marginShift = Math.cos(phase * 2.3) * 12 * intensity;
          const opacityVal = 0.65 + 0.35 * (Math.sin(phase * 2.1) * 0.5 + 0.5);

          slot.style.transform = `translate(${offsetX}px, ${offsetY}px) rotateZ(${rotZ}deg)`;
          slot.style.margin = `0 ${baseMargins[i] + marginShift}px`;
          slot.style.opacity = opacityVal;
          slot.classList.add('shuffling');
        }
      });

      frame++;
      requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
  });
}

// ============================================
//  惯性滚动（三段式）
// ============================================
function inertiaScrollToCard(targetSlot) {
  return new Promise(resolve => {
    const slotRect = targetSlot.getBoundingClientRect();
    const scrollRect = cardsScroll.getBoundingClientRect();
    const targetCenter = slotRect.left - scrollRect.left + slotRect.width / 2;
    const targetScrollLeft = cardsScroll.scrollLeft + targetCenter - scrollRect.width / 2;
    const startLeft = cardsScroll.scrollLeft;
    const totalDistance = targetScrollLeft - startLeft;

    if (Math.abs(totalDistance) < 100) {
      cardsScroll.scrollTo({ left: targetScrollLeft, behavior: 'smooth' });
      setTimeout(resolve, 500);
      return;
    }

    const fastTarget = startLeft + totalDistance * 0.55;
    cardsScroll.scrollTo({ left: fastTarget, behavior: 'auto' });

    setTimeout(() => {
      const midTarget = startLeft + totalDistance * 0.82;
      cardsScroll.scrollTo({ left: midTarget, behavior: 'auto' });

      setTimeout(() => {
        cardsScroll.scrollTo({ left: targetScrollLeft, behavior: 'smooth' });
        setTimeout(resolve, 650);
      }, 180);
    }, 160);
  });
}

// ============================================
//  抽牌流程
// ============================================
async function pickCard() {
  if (isProcessing) return;
  isProcessing = true;
  statusEl.innerText = '🎴 洗牌中...';

  // 随机选一张
  pickedIndex = Math.floor(Math.random() * TAROT_CARDS.length);
  const targetSlot = cardSlots[pickedIndex];

  // 洗牌动画
  await shuffleAnimation();

  // 惯性滚动到选中的牌
  await inertiaScrollToCard(targetSlot);

  // 翻转选中的牌
  targetSlot.classList.add('flipped');

  // 粒子爆发
  const slotRect = targetSlot.getBoundingClientRect();
  const burstX = slotRect.left + slotRect.width / 2;
  const burstY = slotRect.top + slotRect.height / 2;
  spawnBurst(burstX, burstY, 45);

  // 等待翻转动画
  await new Promise(r => setTimeout(r, 900));

  // 显示结果
  const card = TAROT_CARDS[pickedIndex];
  showResult(card);
}

function showResult(card) {
  resultIcon.textContent = '🃏';
  resultName.textContent = card.cn;
  resultEn.textContent = card.en;
  resultInterp.textContent = '🔮 AI 解读中...';
  resultInterp.className = 'result-interp loading';
  resultOverlay.classList.add('active');
  statusEl.innerText = '✨ 已抽牌';

  // 调用 AI 解读
  callGemini(card);
}

function closeResult() {
  resultOverlay.classList.remove('active');
  if (pickedIndex >= 0 && pickedIndex < cardSlots.length) {
    cardSlots[pickedIndex].classList.remove('flipped');
  }
  pickedIndex = -1;
  isProcessing = false;
  statusEl.innerText = '✨ 就绪';

  setTimeout(() => {
    const mid = cardsScroll.scrollWidth / 2 - cardsScroll.clientWidth / 2;
    cardsScroll.scrollLeft = mid;
  }, 300);
}

resultClose.addEventListener('click', closeResult);

// 点击遮罩层关闭（方便触摸操作）
resultOverlay.addEventListener('click', function(e) {
  if (e.target === resultOverlay) closeResult();
});

// ============================================
//  Gemini API 调用
// ============================================
async function callGemini(card) {
  try {
    const cardType = card.suit === 'major' ? '大阿尔卡纳' : `小阿尔卡纳（${card.suitCn}组）`;
    const prompt = `你是一位资深塔罗牌解读师。请为塔罗牌"${card.cn}"（${cardType}）撰写一段200-350字的深度解读。必须包含以下三部分，段落分明：

1. 牌面象征：描述这张牌的核心意象和符号含义，揭示其深层隐喻。
2. 当前启示：结合牌面能量，给出对抽牌者当下的核心指引和提醒。
3. 建议行动：提供1-2条具体、可执行的行动方向或心态调整建议。

语气真挚、有洞察力，直接讲述解读内容，不要用"这张牌代表"开头。`;

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.8, maxOutputTokens: 600 }
        })
      }
    );

    if (!response.ok) throw new Error(`API错误: ${response.status}`);

    const data = await response.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || OFFLINE_READINGS[card.cn] || '相信你的直觉，答案就在心中';

    resultInterp.textContent = text;
    resultInterp.className = 'result-interp';
    statusEl.innerText = '✨ AI 已解读';
  } catch (error) {
    console.error('Gemini 调用失败:', error);
    resultInterp.textContent = OFFLINE_READINGS[card.cn] || '命运自有安排，放松去感受';
    resultInterp.className = 'result-interp';
    statusEl.innerText = '📡 离线解读';
  }
}

// ============================================
//  粒子系统 (Canvas + RAF 驱动)
// ============================================
const particleCanvas = document.getElementById('particleCanvas');
const pctx = particleCanvas.getContext('2d');
let bgParticles = [];
let burstParticles = [];

function resizeParticleCanvas() {
  particleCanvas.width = window.innerWidth;
  particleCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeParticleCanvas);
resizeParticleCanvas();

function createBgParticles() {
  bgParticles = [];
  const count = 70;
  const colors = [
    'rgba(201,168,76,',
    'rgba(168,85,247,',
    'rgba(232,212,154,',
    'rgba(139,92,246,',
    'rgba(250,204,80,',
  ];
  for (let i = 0; i < count; i++) {
    bgParticles.push({
      x: Math.random() * particleCanvas.width,
      y: Math.random() * particleCanvas.height,
      size: Math.random() * 2.5 + 0.8,
      speedX: (Math.random() - 0.5) * 0.25,
      speedY: -(Math.random() * 0.35 + 0.08),
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: Math.random() * 0.6 + 0.2,
      twinklePhase: Math.random() * Math.PI * 2,
    });
  }
}

function spawnBurst(x, y, count) {
  const colors = [
    'rgba(201,168,76,',
    'rgba(168,85,247,',
    'rgba(255,255,220,',
    'rgba(232,212,154,',
    'rgba(139,92,246,',
    'rgba(250,204,80,',
  ];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3.5 + 1.2;
    const life = Math.random() * 0.7 + 0.6;
    burstParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - Math.random() * 1.5,
      size: Math.random() * 3 + 1.2,
      color: colors[Math.floor(Math.random() * colors.length)],
      life,
      maxLife: life,
      gravity: 0.03,
    });
  }
}

function animateParticles() {
  pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

  // 背景粒子
  for (let p of bgParticles) {
    p.x += p.speedX;
    p.y += p.speedY;

    if (p.y < -10) { p.y = particleCanvas.height + 10; p.x = Math.random() * particleCanvas.width; }
    if (p.y > particleCanvas.height + 10) { p.y = -10; p.x = Math.random() * particleCanvas.width; }
    if (p.x < -10) p.x = particleCanvas.width + 10;
    if (p.x > particleCanvas.width + 10) p.x = -10;

    p.twinklePhase += 0.02;
    const twinkleAlpha = p.alpha + Math.sin(p.twinklePhase) * 0.15;

    pctx.beginPath();
    pctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pctx.fillStyle = p.color + Math.min(twinkleAlpha, 1) + ')';
    pctx.fill();

    if (p.size > 1.8) {
      pctx.beginPath();
      pctx.arc(p.x, p.y, p.size * 2.2, 0, Math.PI * 2);
      pctx.fillStyle = p.color + Math.min(twinkleAlpha * 0.18, 0.2) + ')';
      pctx.fill();
    }
  }

  // 爆发粒子
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.life -= 0.016;

    if (p.life <= 0) {
      burstParticles.splice(i, 1);
      continue;
    }

    const fadeRatio = p.life / p.maxLife;
    pctx.beginPath();
    pctx.arc(p.x, p.y, p.size * fadeRatio, 0, Math.PI * 2);
    pctx.fillStyle = p.color + fadeRatio + ')';
    pctx.fill();

    pctx.beginPath();
    pctx.arc(p.x - p.vx * 1.5, p.y - p.vy * 1.5, p.size * 0.5 * fadeRatio, 0, Math.PI * 2);
    pctx.fillStyle = p.color + (fadeRatio * 0.3) + ')';
    pctx.fill();
  }

  requestAnimationFrame(animateParticles);
}

// 粒子系统保底启动
try { createBgParticles(); } catch (e) { console.error('背景粒子创建失败:', e); }
try { animateParticles(); } catch (e) { console.error('粒子动画启动失败:', e); }

// ============================================
//  启动 — 零外部依赖，立即渲染
// ============================================
(function init() {
  buildCards();
  statusEl.innerText = '✨ 就绪';
})();
</script>
