<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>塔罗牌</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0a0f;color:#e0d8c8;font-family:"Noto Serif SC","STSong",serif;
  overflow-x:hidden;min-height:100vh;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
canvas#bg{position:fixed;top:0;left:0;z-index:0;pointer-events:none}
/* 摄像头隐藏 */
#cam{position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1}
#gesture-status{position:fixed;top:12px;right:16px;z-index:100;font-size:11px;color:#665;opacity:0;transition:opacity .4s}
#gesture-status.active{opacity:.7}
.container{position:relative;z-index:1;max-width:100%;margin:0 auto;padding:16px 0}
h1{text-align:center;font-size:clamp(20px,3vw,28px);letter-spacing:.15em;color:#c9a84c;margin:8px 0 4px}
.subtitle{text-align:center;font-size:12px;color:#665;margin-bottom:18px}
/* 牌组分组行 */
.deck-row{margin:0 0 18px}
.deck-row-label{padding:0 20px 6px;font-size:13px;letter-spacing:.08em;font-weight:bold}
.deck-row-label.gold{color:#c9a84c}
.deck-row-label.red{color:#c0392b}
.deck-row-label.blue{color:#2980b9}
.deck-row-label.gray{color:#7f8c8d}
.deck-row-label.green{color:#27ae60}
.deck-scroll{
  display:flex;gap:10px;overflow-x:auto;overflow-y:hidden;
  padding:8px 20px 14px;scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;touch-action:pan-x;
  scrollbar-width:thin;scrollbar-color:#333 transparent;
}
.deck-scroll::-webkit-scrollbar{height:4px}
.deck-scroll::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
/* 单张牌 */
.card{
  flex:0 0 auto;width:clamp(90px,13vw,120px);height:clamp(144px,20vw,192px);
  border-radius:10px;position:relative;cursor:pointer;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  border:3px solid #444;background:#1a1a2e;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;overflow:hidden;
}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.card:active{transform:scale(.96)}
.card.highlight{transform:scale(1.08);box-shadow:0 0 20px rgba(201,168,76,.5);z-index:5}
/* 边框颜色 */
.card.arcana{border-color:#c9a84c}
.card.wands{border-color:#c0392b}
.card.cups{border-color:#2980b9}
.card.swords{border-color:#7f8c8d}
.card.pentacles{border-color:#27ae60}
.card .card-inner{text-align:center;padding:8px}
.card .card-name{font-size:clamp(10px,1.4vw,13px);color:#ccc;margin-top:6px;line-height:1.3}
.card .card-symbol{font-size:clamp(24px,4vw,40px)}
/* 长按进度 */
.longpress-ring{position:absolute;top:4px;right:4px;width:22px;height:22px;pointer-events:none;opacity:0;transition:opacity .15s}
.longpress-ring.active{opacity:1}
.longpress-ring circle{fill:none;stroke:#c9a84c;stroke-width:3;stroke-dasharray:56.55;stroke-dashoffset:56.55;transition:none}
/* 引导文字 */
.guide-text{text-align:center;color:#555;font-size:13px;margin:10px 0 20px;letter-spacing:.05em}
/* 结果弹窗 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;
  display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.result-card{
  background:#1a1a2e;border:1px solid #333;border-radius:16px;
  padding:24px;max-width:500px;width:92%;max-height:85vh;
  overflow-y:auto;position:relative;animation:popIn .35s ease
}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.result-card h3{color:#c9a84c;text-align:center;margin-bottom:8px;font-size:20px}
.result-card .card-desc{margin-top:12px;font-size:14px;line-height:1.7;color:#bbb}
.result-card .close-btn{
  position:sticky;top:0;float:right;background:none;border:1px solid #555;
  color:#aaa;padding:4px 14px;border-radius:20px;cursor:pointer;font-size:13px;
  z-index:5
}
.result-card .close-btn:hover{color:#fff;border-color:#888}
/* 牌背翻转动画 */
.card.flipping{animation:flipAnim .6s ease}
@keyframes flipAnim{
  0%{transform:rotateY(0)}
  50%{transform:rotateY(90deg) scale(1.05)}
  100%{transform:rotateY(0) scale(1)}
}
/* 洗牌动画 */
.card.shuffling{animation:shuffle .3s ease}
@keyframes shuffle{
  0%,100%{transform:translateY(0)}
  25%{transform:translateY(-14px) rotate(-3deg)}
  75%{transform:translateY(-14px) rotate(3deg)}
}
/* 响应式 */
@media(max-width:768px){
  .card{width:clamp(80px,18vw,105px);height:clamp(128px,27vw,168px)}
  .deck-scroll{gap:8px;padding:6px 12px 12px}
}
@media(max-width:480px){
  .card{width:clamp(72px,22vw,90px);height:clamp(115px,33vw,144px)}
  .deck-scroll{gap:6px;padding:4px 8px 10px}
}
</style>

let lastTap = 0;
let longPressTimer = null;
let isLongPress = false;
let longPressStart = 0;

// ==================== 构建牌组（4行分组） ====================
function buildCards(){
  const rows = [
    {cards:ARCANA,cls:'arcana',label:'大阿尔卡纳',labelCls:'gold'},
    {cards:WANDS,cls:'wands',label:'权杖组',labelCls:'red'},
    {cards:CUPS,cls:'cups',label:'圣杯组',labelCls:'blue'},
    {cards:[...SWORDS,...PENTACLES],cls:'swords',label:'宝剑组 + 星币组',labelCls:'gray'}
  ];
  // 宝剑和星币在同一行，但星币卡用 pentacles 类
  let html='';
  for(const row of rows){
    html+=`<div class="deck-row"><div class="deck-row-label ${row.labelCls}">${row.label} (${row.cards.length}张)</div><div class="deck-scroll">`;
    for(const c of row.cards){
      const cls = c.id>=64?'pentacles':(c.id>=50?'swords':row.cls);
      html+=`<div class="card ${cls}" data-id="${c.id}" data-name="${c.name}">
        <div class="card-inner"><div class="card-symbol">${c.symbol}</div><div class="card-name">${c.name}</div></div>
        <svg class="longpress-ring" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
      </div>`;
    }
    html+='</div></div>';
  }
  deckContainer.innerHTML=html;
  bindCardEvents();
}

function bindCardEvents(){
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('touchstart',onTouchStart,{passive:false});
    card.addEventListener('touchmove',onTouchMove,{passive:false});
    card.addEventListener('touchend',onTouchEnd);
    card.addEventListener('dblclick',e=>{e.preventDefault();triggerDraw(card);});
    card.addEventListener('mousedown',onMouseDown);
  });
}

function onTouchStart(e){
  e.preventDefault();
  const card=e.currentTarget;
  longPressStart=Date.now();
  isLongPress=false;
  card.classList.add('highlight');
  const ring=card.querySelector('.longpress-ring');
  ring.classList.add('active');
  const circle=ring.querySelector('circle');
  circle.style.transition='none';
  circle.style.strokeDashoffset='56.55';
  longPressTimer=setInterval(()=>{
    const elapsed=Date.now()-longPressStart;
    const progress=Math.min(elapsed/600,1);
    circle.style.strokeDashoffset=(56.55*(1-progress)).toFixed(2);
    if(elapsed>=600 && !isLongPress){
      isLongPress=true;
      clearInterval(longPressTimer);
      ring.classList.remove('active');
      card.classList.remove('highlight');
      triggerDraw(card);
    }
  },50);
}

function onTouchMove(e){
  if(longPressTimer){
    clearInterval(longPressTimer);longPressTimer=null;
    const card=e.currentTarget;
    card.classList.remove('highlight');
    card.querySelector('.longpress-ring').classList.remove('active');
  }
}

function onTouchEnd(e){
  if(longPressTimer){clearInterval(longPressTimer);longPressTimer=null;}
  const card=e.currentTarget;
  card.classList.remove('highlight');
  card.querySelector('.longpress-ring').classList.remove('active');
  if(isLongPress){isLongPress=false;return;}
  const now=Date.now();
  if(now-lastTap<400){
    triggerDraw(card);
    lastTap=0;
  }else{
    lastTap=now;
    setTimeout(()=>{if(Date.now()-lastTap>=400)lastTap=0;},410);
  }
}

function onMouseDown(e){
  if(e.button!==0)return;
  const card=e.currentTarget;
  longPressStart=Date.now();
  isLongPress=false;
  const ring=card.querySelector('.longpress-ring');
  ring.classList.add('active');
  const circle=ring.querySelector('circle');
  circle.style.strokeDashoffset='56.55';
  longPressTimer=setInterval(()=>{
    const elapsed=Date.now()-longPressStart;
    circle.style.strokeDashoffset=(56.55*(1-Math.min(elapsed/600,1))).toFixed(2);
    if(elapsed>=600&&!isLongPress){
      isLongPress=true;
      clearInterval(longPressTimer);
      ring.classList.remove('active');
      triggerDraw(card);
    }
  },50);
  const upHandler=()=>{
    clearInterval(longPressTimer);
    ring.classList.remove('active');
    document.removeEventListener('mouseup',upHandler);
  };
  document.addEventListener('mouseup',upHandler);
}

// ==================== 抽牌流程 ====================
async function triggerDraw(card){
  if(selectedCard)return;
  selectedCard=card;
  const id=parseInt(card.dataset.id);
  const cardData=ALL_CARDS.find(c=>c.id===id);
  // 洗牌动画
  card.classList.add('shuffling');
  await sleep(350);
  card.classList.remove('shuffling');
  // 惯性滚动到该牌居中
  const scroll=card.closest('.deck-scroll');
  if(scroll){
    const target=card.offsetLeft-card.parentElement.offsetLeft-scroll.clientWidth/2+card.clientWidth/2;
    scroll.scrollTo({left:target,behavior:'smooth'});
    await sleep(400);
  }
  // 翻转
  card.classList.add('flipping');
  await sleep(650);
  card.classList.remove('flipping');
  // 粒子爆出
  burstParticles(card);
  // AI 解读
  showResult(cardData);
  selectedCard=null;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ==================== AI 解读 ====================
async function showResult(cardData){
  resultTitle.textContent=`${cardData.symbol} ${cardData.name}`;
  resultDesc.textContent='正在请求 AI 解读...';
  overlay.classList.add('show');
  try{
    const aiResult=await callGemini(cardData);
    resultDesc.textContent=aiResult;
  }catch(e){
    resultDesc.textContent=cardData.meaning;
  }
}

async function callGemini(cardData){
  const API_KEY='YOUR_GEMINI_API_KEY';
  if(API_KEY==='YOUR_GEMINI_API_KEY')throw new Error('no key');
  const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:`你是一位塔罗牌大师。请为抽到的牌"${cardData.name}"做一段约200字的中文解读，涵盖正位含义、对当前生活的启示和鼓励。牌面传统寓意：${cardData.meaning}`}]}]})
  });
  const data=await resp.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text||cardData.meaning;
}

function closeResult(){overlay.classList.remove('show');}

// ==================== 粒子背景 ====================
let particles=[],burstParticles_arr=[];
function resizeCanvas(){
  bgCanvas.width=window.innerWidth;
  bgCanvas.height=window.innerHeight;
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

class BgParticle{
  constructor(){this.reset();}
  reset(){
    this.x=Math.random()*bgCanvas.width;
    this.y=Math.random()*bgCanvas.height;
    this.vx=(Math.random()-.5)*.3;
    this.vy=(Math.random()-.5)*.3;
    this.r=Math.random()*2+.5;
    this.a=Math.random()*.3+.05;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;
    if(this.x<0||this.x>bgCanvas.width||this.y<0||this.y>bgCanvas.height)this.reset();
  }
  draw(){
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(201,168,76,${this.a})`;ctx.fill();
  }
}
class BurstParticle{
  constructor(x,y){
    this.x=x;this.y=y;const a=Math.random()*Math.PI*2,s=Math.random()*4+2;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;this.life=1;this.decay=.01+Math.random()*.03;
    this.r=Math.random()*3+1;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;}
  draw(){
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(201,168,76,${this.life*.7})`;ctx.fill();
  }
}
function burstParticles(card){
  const rect=card.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  for(let i=0;i<40;i++)burstParticles_arr.push(new BurstParticle(cx,cy));
}

for(let i=0;i<80;i++)particles.push(new BgParticle());

function animate(){
  ctx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  for(const p of particles){p.update();p.draw();}
  burstParticles_arr=burstParticles_arr.filter(p=>p.life>0);
  for(const p of burstParticles_arr){p.update();p.draw();}
  requestAnimationFrame(animate);
}
animate();

// ==================== 手势识别（按需启动） ====================
let handsInstance=null;
let gestureFistStart=null;
const FIST_DURATION=3000; // 握拳3秒

function isFist(landmarks){
  if(!landmarks||landmarks.length<21)return false;
  // 指尖y > 对应第二关节y 表示手指卷曲
  const tips=[8,12,16,20];const dips=[6,10,14,18];
  for(let i=0;i<4;i++){
    if(landmarks[tips[i]].y<landmarks[dips[i]].y)return false;
  }
  // 拇指: 指尖x偏离IP关节
  if(landmarks[4].x>landmarks[3].x===landmarks[0].x<landmarks[5].x)return false;
  return true;
}

async function initGesture(){
  if(typeof Hands==='undefined'){
    console.log('MediaPipe Hands 未加载，使用纯触摸交互');
    return;
  }
  try{
    handsInstance=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`});
    handsInstance.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:.7,minTrackingConfidence:.5});
    handsInstance.onResults(onHandsResults);

    const stream=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'}});
    camVideo.srcObject=stream;
    await camVideo.play();

    if(typeof Camera==='undefined'){
      console.log('Camera utils 未加载，使用纯触摸交互');
      return;
    }
    const camera=new Camera(camVideo,{
      onFrame:async()=>{await handsInstance.send({image:camVideo});},
      width:320,height:240
    });
    await camera.start();
    gestureReady=true;
    gestureStatus.classList.add('active');
    console.log('手势识别已激活');
  }catch(e){
    console.log('手势识别启动失败，使用纯触摸交互:',e.message);
  }
}

function onHandsResults(results){
  if(!results.multiHandLandmarks||results.multiHandLandmarks.length===0){
    gestureFistStart=null;
    return;
  }
  const lm=results.multiHandLandmarks[0];
  if(isFist(lm)){
    if(!gestureFistStart)gestureFistStart=Date.now();
    else if(Date.now()-gestureFistStart>=FIST_DURATION){
      gestureFistStart=null;
      triggerDrawByGesture();
    }
  }else{
    gestureFistStart=null;
  }
}

function triggerDrawByGesture(){
  const cards=document.querySelectorAll('.card');
  if(cards.length===0)return;
  const idx=Math.floor(Math.random()*cards.length);
  triggerDraw(cards[idx]);
}

// ==================== 启动 ====================
buildCards();
// 手势识别异步初始化，不阻塞牌组渲染
setTimeout(initGesture,500);
</script>
